<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axomic Ai</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Axomic Ai</div>
            <button id="themeToggle" class="theme-btn">🌙</button>
        </header>
        <div class="chat-area" id="chatArea">
            <div class="welcome">Welcome to Axomic Ai. Ask me anything.</div>
        </div>
        <div class="input-area">
            <select id="modeSelect">
                <option value="chat">Chat</option>
                <option value="code">Code</option>
                <option value="image">Image</option>
                <option value="audio">Audio</option>
                <option value="video">Video</option>
            </select>
            <input type="text" id="promptInput" placeholder="Type your message..." />
            <button id="sendBtn">Send</button>
        </div>
        <div class="control-area">
            <button id="undoBtn">↩ Undo</button>
            <button id="redoBtn">↪ Redo</button>
            <button id="exportBtn"> Export</button>
            <button id="importBtn"> Import</button>
            <input type="file" id="fileInput" style="display:none" />
            <input type="text" id="urlInput" placeholder="Train URL..." />
            <button id="trainurlBtn">URL</button>
            <button id="trainurlstreamBtn">URL Stream</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
